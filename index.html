<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arsipanku - Digital Storage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        [x-cloak] { display: none !important; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.26, 0.53, 0.74, 1.48); }
        @keyframes pop { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
        /* Tampilan Mobile ala Android */
        @media (max-width: 768px) {
            .mobile-nav { border-radius: 30px 30px 0 0; }
            .sidebar-hide { display: none; }
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800" x-data="appArsip()">

    <template x-if="page === 'login'">
        <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-900 via-indigo-800 to-blue-700 p-4">
            <div class="bg-white/95 w-full max-w-md rounded-[2.5rem] shadow-2xl p-8 md:p-10 animate-pop border border-white/20">
                <div class="text-center mb-8">
                    <div class="inline-flex p-4 bg-blue-600 rounded-3xl shadow-xl mb-4">
                        <i class="fas fa-folder-open text-3xl text-white"></i>
                    </div>
                    <h1 class="text-3xl font-black text-slate-800 tracking-tighter">ARSIPANKU</h1>
                    <p class="text-slate-400 text-xs font-black uppercase tracking-[0.2em] mt-1">Management System</p>
                </div>

                <div class="flex bg-slate-100 p-1.5 rounded-2xl mb-8">
                    <button @click="loginType = 'admin'" :class="loginType === 'admin' ? 'bg-white shadow-md text-blue-600' : 'text-slate-500'" class="flex-1 py-3 rounded-xl font-black transition-all">ADMIN</button>
                    <button @click="loginType = 'user'" :class="loginType === 'user' ? 'bg-white shadow-md text-blue-600' : 'text-slate-500'" class="flex-1 py-3 rounded-xl font-black transition-all">USER</button>
                </div>

                <div x-show="loginType === 'admin'" class="space-y-4">
                    <input type="text" x-model="auth.adminUser" placeholder="Username (admin1/2/3)" class="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                    <input type="password" x-model="auth.adminPass" placeholder="Password" class="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                    <button @click="doLoginAdmin" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-black shadow-xl shadow-blue-200 active:scale-95 transition">LOGIN ADMIN</button>
                </div>

                <div x-show="loginType === 'user'" class="space-y-4">
                    <input type="text" x-model="auth.userName" placeholder="Nama Lengkap" class="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                    <input type="tel" x-model="auth.userPhone" placeholder="Nomor Handphone" class="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                    <button @click="doLoginUser" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-2xl font-black shadow-xl shadow-indigo-200 active:scale-95 transition">MASUK SEBAGAI USER</button>
                </div>
            </div>
        </div>
    </template>

    <template x-if="page !== 'login'">
        <div class="min-h-screen flex flex-col md:flex-row">
            
            <aside class="w-72 bg-slate-900 text-white flex-col sidebar-hide md:flex">
                <div class="p-8">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-archive text-2xl text-blue-400"></i>
                        <span class="font-black text-xl">ARSIPANKU</span>
                    </div>
                </div>
                <nav class="flex-1 px-4 space-y-1">
                    <template x-if="role === 'admin'">
                        <div>
                            <button @click="menu = 'dash'" :class="menu === 'dash' ? 'bg-blue-600' : 'hover:bg-slate-800'" class="w-full flex items-center gap-4 p-4 rounded-2xl transition font-bold"><i class="fas fa-home"></i> Dashboard</button>
                            <button @click="menu = 'petugas'" :class="menu === 'petugas' ? 'bg-blue-600' : 'hover:bg-slate-800'" class="w-full flex items-center gap-4 p-4 rounded-2xl transition font-bold"><i class="fas fa-users-gear"></i> Data Petugas</button>
                            <button @click="menu = 'arsip'" :class="menu === 'arsip' ? 'bg-blue-600' : 'hover:bg-slate-800'" class="w-full flex items-center gap-4 p-4 rounded-2xl transition font-bold"><i class="fas fa-file-export"></i> Kelola Arsip</button>
                            <button @click="menu = 'laporan'" :class="menu === 'laporan' ? 'bg-blue-600' : 'hover:bg-slate-800'" class="w-full flex items-center gap-4 p-4 rounded-2xl transition font-bold"><i class="fas fa-print"></i> Cetak Laporan</button>
                            <button @click="menu = 'setting'" :class="menu === 'setting' ? 'bg-blue-600' : 'hover:bg-slate-800'" class="w-full flex items-center gap-4 p-4 rounded-2xl transition font-bold"><i class="fas fa-cog"></i> Pengaturan</button>
                        </div>
                    </template>
                    <template x-if="role === 'user'">
                        <div>
                            <button @click="menu = 'user-unduh'" :class="menu === 'user-unduh' ? 'bg-blue-600' : 'hover:bg-slate-800'" class="w-full flex items-center gap-4 p-4 rounded-2xl transition font-bold"><i class="fas fa-cloud-download-alt"></i> Unduh Berkas</button>
                            <button @click="menu = 'user-riwayat'" :class="menu === 'user-riwayat' ? 'bg-blue-600' : 'hover:bg-slate-800'" class="w-full flex items-center gap-4 p-4 rounded-2xl transition font-bold"><i class="fas fa-history"></i> Riwayat Selesai</button>
                            <button @click="menu = 'user-bantuan'" :class="menu === 'user-bantuan' ? 'bg-blue-600' : 'hover:bg-slate-800'" class="w-full flex items-center gap-4 p-4 rounded-2xl transition font-bold"><i class="fas fa-headset"></i> Pesan Bantuan</button>
                        </div>
                    </template>
                </nav>
                <div class="p-6">
                    <button @click="logout" class="w-full p-4 rounded-2xl bg-red-500/10 text-red-400 font-bold hover:bg-red-500 hover:text-white transition"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </aside>

            <main class="flex-1 flex flex-col h-screen overflow-hidden">
                <header class="bg-white border-b px-6 py-4 flex justify-between items-center z-10">
                    <div class="flex items-center gap-4">
                        <button @click="sidebarOpen = true" class="md:hidden text-slate-600"><i class="fas fa-bars text-xl"></i></button>
                        <h2 class="text-sm font-black text-slate-400 uppercase tracking-widest" x-text="menu.replace('-', ' ')"></h2>
                    </div>
                    
                    <div class="relative" x-data="{ openDots: false }">
                        <button @click="openDots = !openDots" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-100 transition">
                            <i class="fas fa-ellipsis-v text-slate-500"></i>
                        </button>
                        <div x-show="openDots" @click.away="openDots = false" x-cloak class="absolute right-0 mt-2 w-48 bg-white rounded-2xl shadow-2xl border p-2 z-50 animate-pop">
                            <div class="p-3 border-b text-xs font-black text-slate-400 uppercase">Aksi Cepat</div>
                            <button @click="menu = role === 'admin' ? 'setting' : 'user-bantuan'; openDots=false" class="w-full text-left p-3 hover:bg-slate-50 rounded-xl text-sm font-bold flex items-center gap-3"><i class="fas fa-shield text-blue-500"></i> Keamanan</button>
                            <button @click="logout" class="w-full text-left p-3 hover:bg-red-50 rounded-xl text-sm font-bold text-red-600 flex items-center gap-3"><i class="fas fa-power-off"></i> Logout</button>
                        </div>
                    </div>
                </header>

                <div class="flex-1 overflow-y-auto p-4 md:p-8 pb-24 md:pb-8">
                    
                    <div x-show="menu === 'dash'" class="space-y-6">
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <div class="bg-white p-6 rounded-3xl border shadow-sm">
                                <p class="text-xs font-bold text-slate-400 mb-1 uppercase">Arsip</p>
                                <h3 class="text-2xl font-black" x-text="arsip.length"></h3>
                            </div>
                            <div class="bg-white p-6 rounded-3xl border shadow-sm">
                                <p class="text-xs font-bold text-slate-400 mb-1 uppercase">Petugas</p>
                                <h3 class="text-2xl font-black" x-text="petugas.length"></h3>
                            </div>
                            <div class="bg-white p-6 rounded-3xl border shadow-sm">
                                <p class="text-xs font-bold text-slate-400 mb-1 uppercase">Pesan</p>
                                <h3 class="text-2xl font-black" x-text="messages.length"></h3>
                            </div>
                            <div class="bg-white p-6 rounded-3xl border shadow-sm">
                                <p class="text-xs font-bold text-slate-400 mb-1 uppercase">Selesai</p>
                                <h3 class="text-2xl font-black" x-text="riwayat.length"></h3>
                            </div>
                        </div>

                        <div class="bg-blue-600 text-white p-8 rounded-[2.5rem] shadow-xl relative overflow-hidden">
                            <div class="relative z-10">
                                <h3 class="text-xl font-black mb-2 tracking-tight">Tautan Berbagi Aplikasi</h3>
                                <p class="text-blue-100 text-sm mb-6 max-w-sm">Salin link ini untuk user. Data tetap tersimpan aman di GitHub Pages anda.</p>
                                <div class="flex gap-2">
                                    <input type="text" readonly :value="appLink" class="bg-white/20 border-none px-4 py-3 rounded-xl text-sm w-full outline-none">
                                    <button @click="copyLink" class="bg-white text-blue-600 px-6 py-3 rounded-xl font-black text-sm active:scale-95 transition shadow-lg">SALIN</button>
                                </div>
                            </div>
                            <i class="fas fa-share-nodes absolute -bottom-10 -right-10 text-[12rem] text-white/10 rotate-12"></i>
                        </div>
                    </div>

                    <div x-show="menu === 'petugas'" class="bg-white rounded-[2rem] border overflow-hidden">
                        <div class="p-6 border-b flex justify-between items-center">
                            <h3 class="font-black text-slate-700">Daftar Petugas</h3>
                            <button @click="openModalPetugas()" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl font-black text-xs shadow-lg">+ TAMBAH</button>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-sm">
                                <thead class="bg-slate-50 text-slate-400 font-black uppercase text-[10px]">
                                    <tr><th class="p-6">ID / Nama</th><th class="p-6">Jabatan</th><th class="p-6">No. HP / Alamat</th><th class="p-6">Aksi</th></tr>
                                </thead>
                                <tbody class="divide-y">
                                    <template x-for="(p, i) in petugas" :key="i">
                                        <tr class="hover:bg-slate-50 transition">
                                            <td class="p-6">
                                                <div class="font-black text-slate-800" x-text="p.nama"></div>
                                                <div class="text-[10px] text-slate-400 font-mono uppercase" x-text="p.id"></div>
                                            </td>
                                            <td class="p-6 font-bold text-slate-600" x-text="p.jabatan"></td>
                                            <td class="p-6">
                                                <div class="font-bold text-blue-600" x-text="p.hp"></div>
                                                <div class="text-xs text-slate-400" x-text="p.alamat"></div>
                                            </td>
                                            <td class="p-6 flex gap-2">
                                                <button @click="editPetugas(i)" class="w-10 h-10 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center transition hover:bg-blue-600 hover:text-white"><i class="fas fa-edit"></i></button>
                                                <button @click="deletePetugas(i)" class="w-10 h-10 bg-red-50 text-red-600 rounded-xl flex items-center justify-center transition hover:bg-red-600 hover:text-white"><i class="fas fa-trash"></i></button>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div x-show="menu === 'arsip'" class="space-y-6">
                        <div class="bg-white p-10 rounded-[2.5rem] border-2 border-dashed border-slate-200 text-center hover:border-blue-500 transition-all group">
                            <div class="w-20 h-20 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition duration-500"><i class="fas fa-cloud-arrow-up text-3xl"></i></div>
                            <h3 class="text-xl font-black text-slate-800">Kirim Berkas (PDF/KHS)</h3>
                            <p class="text-slate-400 text-sm mb-6">Pilih file untuk dikirim ke semua user</p>
                            <input type="file" @change="handleUpload" class="hidden" id="fileInput">
                            <label for="fileInput" class="inline-block bg-blue-600 text-white px-10 py-4 rounded-2xl font-black cursor-pointer shadow-xl shadow-blue-100 hover:bg-blue-700 active:scale-95 transition">PILIH & KIRIM</label>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            <template x-for="(f, i) in arsip" :key="i">
                                <div class="bg-white p-6 rounded-3xl border shadow-sm flex items-center justify-between animate-pop">
                                    <div class="flex items-center gap-4">
                                        <div class="w-12 h-12 bg-red-50 text-red-500 rounded-2xl flex items-center justify-center text-xl"><i class="fas fa-file-pdf"></i></div>
                                        <div>
                                            <p class="font-black text-slate-800 truncate w-32 md:w-48" x-text="f.nama"></p>
                                            <p class="text-[10px] text-slate-400 font-bold uppercase" x-text="f.tgl"></p>
                                        </div>
                                    </div>
                                    <button @click="deleteArsip(i)" class="text-slate-300 hover:text-red-500 transition"><i class="fas fa-times-circle text-2xl"></i></button>
                                </div>
                            </template>
                        </div>
                    </div>

                    <div x-show="menu === 'laporan'" class="max-w-xl mx-auto">
                        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl border border-slate-100">
                            <div class="text-center mb-8">
                                <div class="w-20 h-20 bg-slate-900 text-white rounded-3xl flex items-center justify-center mx-auto mb-4 text-3xl shadow-xl"><i class="fas fa-print"></i></div>
                                <h3 class="text-2xl font-black">Generator Laporan</h3>
                                <p class="text-slate-400 text-sm font-bold uppercase tracking-widest mt-1">Export Data ke PDF Otomatis</p>
                            </div>
                            <div class="space-y-6">
                                <div>
                                    <label class="text-xs font-black text-slate-400 uppercase ml-2">Judul/Tujuan Laporan</label>
                                    <input type="text" x-model="reportForm.title" placeholder="Contoh: Laporan Data Sehari" class="w-full mt-1 p-5 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition font-bold">
                                </div>
                                <div>
                                    <label class="text-xs font-black text-slate-400 uppercase ml-2">Catatan Tambahan</label>
                                    <textarea x-model="reportForm.note" class="w-full mt-1 p-5 bg-slate-50 border border-slate-200 rounded-2xl h-32 outline-none focus:ring-2 focus:ring-blue-500 transition font-bold" placeholder="Tulis rincian laporan keseharian..."></textarea>
                                </div>
                                <button @click="generatePDF" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black shadow-2xl shadow-slate-200 active:scale-95 transition flex items-center justify-center gap-3">
                                    <i class="fas fa-file-pdf"></i> GENERATE & CETAK PDF
                                </button>
                            </div>
                        </div>
                    </div>

                    <div x-show="menu === 'setting'" class="max-w-xl mx-auto space-y-6">
                        <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border animate-pop">
                            <h4 class="text-xl font-black mb-6 flex items-center gap-3 text-blue-600"><i class="fas fa-user-lock"></i> Kredensial Admin</h4>
                            <div class="space-y-4">
                                <div>
                                    <label class="text-xs font-black text-slate-400 uppercase ml-2">Username Admin Aktif</label>
                                    <input type="text" x-model="activeAdmin" class="w-full mt-1 p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold">
                                </div>
                                <div>
                                    <label class="text-xs font-black text-slate-400 uppercase ml-2">Password Baru</label>
                                    <input type="password" placeholder="••••••••" class="w-full mt-1 p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                                </div>
                                <button @click="alert('Username berhasil diubah!')" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg">SIMPAN PENGATURAN</button>
                            </div>
                        </div>
                        <div class="bg-red-50 p-8 rounded-[2.5rem] border border-red-100">
                            <h4 class="font-black text-red-600 mb-2">Zona Bahaya</h4>
                            <p class="text-xs text-red-400 font-bold uppercase mb-6">Menghapus semua data (Arsip, Petugas, Riwayat) dari perangkat ini.</p>
                            <button @click="resetApp" class="w-full bg-white text-red-600 border border-red-200 py-4 rounded-2xl font-black hover:bg-red-600 hover:text-white transition">RISET DATA APLIKASI</button>
                        </div>
                    </div>

                    <div x-show="menu === 'user-unduh'" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <template x-if="arsip.length === 0">
                            <div class="col-span-full py-20 text-center text-slate-400 font-bold bg-white rounded-3xl border border-dashed">Belum ada dokumen dari admin.</div>
                        </template>
                        <template x-for="(f, i) in arsip" :key="i">
                            <div class="bg-white p-8 rounded-[2.5rem] border shadow-md hover:shadow-2xl transition duration-500 flex flex-col items-center text-center animate-pop">
                                <div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-3xl flex items-center justify-center text-3xl mb-4 shadow-inner"><i class="fas fa-file-pdf"></i></div>
                                <h4 class="font-black text-slate-800 mb-1 truncate w-full px-2" x-text="f.nama"></h4>
                                <p class="text-[10px] font-black text-slate-400 mb-6 uppercase tracking-widest" x-text="'DIKIRIM: ' + f.tgl"></p>
                                <button @click="downloadFile(f)" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-xl shadow-blue-100 hover:bg-blue-700 transition flex items-center justify-center gap-3">
                                    <i class="fas fa-download"></i> UNDUH KHS/PDF
                                </button>
                            </div>
                        </template>
                    </div>

                    <div x-show="menu === 'user-riwayat'" class="max-w-xl mx-auto space-y-4">
                        <template x-if="riwayat.filter(r => r.user === auth.userName).length === 0">
                            <div class="py-20 text-center text-slate-400 font-bold bg-white rounded-3xl border border-dashed">Riwayat unduhan Anda masih kosong.</div>
                        </template>
                        <template x-for="(r, i) in riwayat.filter(r => r.user === auth.userName)" :key="i">
                            <div class="bg-white p-6 rounded-3xl border shadow-sm flex items-center gap-4 animate-pop">
                                <div class="w-12 h-12 bg-green-500 text-white rounded-2xl flex items-center justify-center shadow-lg"><i class="fas fa-check-double"></i></div>
                                <div>
                                    <p class="text-sm font-black text-slate-800" x-text="'Berhasil mengunduh ' + r.file"></p>
                                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter" x-text="r.waktu"></p>
                                </div>
                            </div>
                        </template>
                    </div>

                    <div x-show="menu === 'user-bantuan'" class="max-w-lg mx-auto bg-white p-8 rounded-[2.5rem] shadow-2xl border border-indigo-50">
                        <div class="text-center mb-8">
                            <div class="w-20 h-20 bg-indigo-600 text-white rounded-3xl flex items-center justify-center mx-auto mb-4 text-3xl shadow-xl shadow-indigo-100"><i class="fas fa-headset"></i></div>
                            <h3 class="text-2xl font-black">Hubungi Admin</h3>
                            <p class="text-slate-400 text-sm font-bold uppercase mt-1 tracking-widest">Pusat Kesulitan User</p>
                        </div>
                        <textarea x-model="userMsg" class="w-full p-6 bg-slate-50 border border-slate-200 rounded-3xl h-40 outline-none focus:ring-2 focus:ring-indigo-500 transition font-bold" placeholder="Ada kesulitan apa? Tulis di sini..."></textarea>
                        <button @click="sendHelp" class="w-full bg-indigo-600 text-white py-5 rounded-3xl font-black shadow-2xl shadow-indigo-200 active:scale-95 transition mt-4">KIRIM PESAN</button>
                    </div>

                </div>
            </main>

            <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-around items-center mobile-nav shadow-[0_-10px_30px_rgba(0,0,0,0.05)] z-40">
                <template x-if="role === 'admin'">
                    <div class="flex justify-around w-full">
                        <button @click="menu = 'dash'" :class="menu === 'dash' ? 'text-blue-600 scale-110' : 'text-slate-400'" class="flex flex-col items-center transition"><i class="fas fa-home text-xl"></i><span class="text-[9px] font-black mt-1">HOME</span></button>
                        <button @click="menu = 'petugas'" :class="menu === 'petugas' ? 'text-blue-600 scale-110' : 'text-slate-400'" class="flex flex-col items-center transition"><i class="fas fa-users-gear text-xl"></i><span class="text-[9px] font-black mt-1">DATA</span></button>
                        <button @click="menu = 'arsip'" :class="menu === 'arsip' ? 'text-blue-600 scale-110' : 'text-slate-400'" class="flex flex-col items-center transition"><i class="fas fa-upload text-xl"></i><span class="text-[9px] font-black mt-1">ARSIP</span></button>
                        <button @click="menu = 'laporan'" :class="menu === 'laporan' ? 'text-blue-600 scale-110' : 'text-slate-400'" class="flex flex-col items-center transition"><i class="fas fa-print text-xl"></i><span class="text-[9px] font-black mt-1">PDF</span></button>
                    </div>
                </template>
                <template x-if="role === 'user'">
                    <div class="flex justify-around w-full">
                        <button @click="menu = 'user-unduh'" :class="menu === 'user-unduh' ? 'text-blue-600 scale-110' : 'text-slate-400'" class="flex flex-col items-center transition"><i class="fas fa-cloud-download-alt text-xl"></i><span class="text-[9px] font-black mt-1">UNDUH</span></button>
                        <button @click="menu = 'user-riwayat'" :class="menu === 'user-riwayat' ? 'text-blue-600 scale-110' : 'text-slate-400'" class="flex flex-col items-center transition"><i class="fas fa-history text-xl"></i><span class="text-[9px] font-black mt-1">RIWAYAT</span></button>
                        <button @click="menu = 'user-bantuan'" :class="menu === 'user-bantuan' ? 'text-blue-600 scale-110' : 'text-slate-400'" class="flex flex-col items-center transition"><i class="fas fa-headset text-xl"></i><span class="text-[9px] font-black mt-1">BANTUAN</span></button>
                    </div>
                </template>
            </nav>
        </div>
    </template>

    <div x-show="modalPetugas" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4" x-cloak x-transition>
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl animate-pop">
            <h3 class="text-2xl font-black mb-6" x-text="editIdx === null ? 'Tambah Petugas' : 'Edit Petugas'"></h3>
            <div class="space-y-4">
                <input x-model="formPetugas.nama" type="text" placeholder="Nama Lengkap" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold">
                <input x-model="formPetugas.jabatan" type="text" placeholder="Jabatan" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold">
                <input x-model="formPetugas.alamat" type="text" placeholder="Alamat Domisili" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold">
                <input x-model="formPetugas.hp" type="text" placeholder="No. Handphone" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold">
            </div>
            <div class="flex gap-2 mt-8">
                <button @click="modalPetugas = false" class="flex-1 py-4 text-slate-400 font-black">BATAL</button>
                <button @click="savePetugas" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-black shadow-xl shadow-blue-100 transition">SIMPAN DATA</button>
            </div>
        </div>
    </div>

    <script>
        function appArsip() {
            return {
                page: 'login',
                loginType: 'admin',
                role: null,
                menu: 'dash',
                sidebarOpen: false,
                appLink: window.location.origin + window.location.pathname,
                
                auth: { adminUser: '', adminPass: '', userName: '', userPhone: '' },
                activeAdmin: 'admin1',

                // Database Local
                petugas: JSON.parse(localStorage.getItem('db_petugas')) || [],
                arsip: JSON.parse(localStorage.getItem('db_arsip')) || [],
                messages: JSON.parse(localStorage.getItem('db_pesan')) || [],
                riwayat: JSON.parse(localStorage.getItem('db_riwayat')) || [],

                modalPetugas: false,
                editIdx: null,
                formPetugas: { id: '', nama: '', jabatan: '', alamat: '', hp: '' },
                userMsg: '',
                reportForm: { title: '', note: '' },

                doLoginAdmin() {
                    const valid = ['admin1', 'admin2', 'admin3'];
                    if(valid.includes(this.auth.adminUser) && this.auth.adminPass === '12345') {
                        this.role = 'admin';
                        this.activeAdmin = this.auth.adminUser;
                        this.page = 'dashboard';
                    } else { alert('Akses Ditolak! Gunakan admin1-3/12345'); }
                },

                doLoginUser() {
                    if(this.auth.userName && this.auth.userPhone) {
                        this.role = 'user';
                        this.page = 'dashboard';
                        this.menu = 'user-unduh';
                    } else { alert('Mohon isi Nama & HP!'); }
                },

                logout() {
                    this.page = 'login';
                    this.auth = { adminUser: '', adminPass: '', userName: '', userPhone: '' };
                },

                openModalPetugas() {
                    this.editIdx = null;
                    this.formPetugas = { id: 'REG-' + Date.now().toString().slice(-4), nama: '', jabatan: '', alamat: '', hp: '' };
                    this.modalPetugas = true;
                },

                editPetugas(idx) {
                    this.editIdx = idx;
                    this.formPetugas = { ...this.petugas[idx] };
                    this.modalPetugas = true;
                },

                savePetugas() {
                    if(this.editIdx === null) this.petugas.push({...this.formPetugas});
                    else this.petugas[this.editIdx] = {...this.formPetugas};
                    this.sync();
                    this.modalPetugas = false;
                },

                deletePetugas(idx) {
                    if(confirm('Hapus petugas ini?')) { this.petugas.splice(idx, 1); this.sync(); }
                },

                handleUpload(e) {
                    const file = e.target.files[0];
                    if(!file) return;
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        this.arsip.unshift({
                            nama: file.name,
                            tgl: new Date().toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'}).toUpperCase(),
                            blob: event.target.result // Base64
                        });
                        this.sync();
                        alert('File berhasil dikirim ke User!');
                    };
                    reader.readAsDataURL(file);
                },

                deleteArsip(idx) {
                    if(confirm('Hapus arsip ini?')) { this.arsip.splice(idx, 1); this.sync(); }
                },

                downloadFile(f) {
                    const link = document.createElement("a");
                    link.href = f.blob;
                    link.download = f.nama;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    // Catat Riwayat
                    this.riwayat.unshift({
                        user: this.auth.userName,
                        file: f.nama,
                        waktu: new Date().toLocaleString('id-ID')
                    });
                    this.sync();
                    alert('File ' + f.nama + ' berhasil diunduh!');
                },

                sendHelp() {
                    if(this.userMsg.trim()) {
                        this.messages.push({
                            sender: this.auth.userName,
                            text: this.userMsg,
                            time: new Date().toLocaleTimeString()
                        });
                        this.sync();
                        this.userMsg = '';
                        alert('Pesan bantuan terkirim!');
                    }
                },

                generatePDF() {
                    if(!this.reportForm.title) return alert('Isi judul laporan!');
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF();
                    
                    // Header
                    doc.setFontSize(22);
                    doc.text("ARSIPANKU DIGITAL REPORT", 105, 20, { align: "center" });
                    doc.setFontSize(10);
                    doc.text("Laporan Otomatis Sistem Manajemen Arsip", 105, 28, { align: "center" });
                    doc.line(20, 32, 190, 32);

                    // User Form Input
                    doc.setFontSize(12);
                    doc.setFont("helvetica", "bold");
                    doc.text("JUDUL: " + this.reportForm.title.toUpperCase(), 20, 45);
                    doc.setFont("helvetica", "normal");
                    doc.text("Catatan: " + this.reportForm.note, 20, 52);
                    doc.text("Tanggal Cetak: " + new Date().toLocaleString(), 20, 59);

                    // Tabel 1: Petugas
                    doc.text("DATA PETUGAS:", 20, 75);
                    doc.autoTable({
                        startY: 78,
                        head: [['ID', 'Nama', 'Jabatan', 'No. HP']],
                        body: this.petugas.map(p => [p.id, p.nama, p.jabatan, p.hp]),
                        theme: 'grid'
                    });

                    // Tabel 2: Riwayat Aktivitas
                    doc.text("RIWAYAT UNDUHAN USER:", 20, doc.lastAutoTable.finalY + 15);
                    doc.autoTable({
                        startY: doc.lastAutoTable.finalY + 18,
                        head: [['User', 'Nama File', 'Waktu Download']],
                        body: this.riwayat.map(r => [r.user, r.file, r.waktu]),
                        theme: 'striped'
                    });

                    doc.save(`Laporan_${this.reportForm.title}.pdf`);
                    alert('Laporan PDF berhasil dibuat dan diunduh!');
                },

                resetApp() {
                    if(confirm('Hapus semua data?')) { localStorage.clear(); location.reload(); }
                },

                copyLink() {
                    navigator.clipboard.writeText(this.appLink);
                    alert('Link disalin! Kirimkan ke user anda.');
                },

                sync() {
                    localStorage.setItem('db_petugas', JSON.stringify(this.petugas));
                    localStorage.setItem('db_arsip', JSON.stringify(this.arsip));
                    localStorage.setItem('db_pesan', JSON.stringify(this.messages));
                    localStorage.setItem('db_riwayat', JSON.stringify(this.riwayat));
                }
            }
        }
    </script>
</body>
</html>
